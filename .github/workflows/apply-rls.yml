name: Apply RLS Policies

on:
  workflow_dispatch:        # run manually from GitHub Actions UI
  push:
    paths:
      - 'backend/db/rls_policies.sql'
      - 'backend/db/rls_policies_roles.sql'
      - 'backend/db/apply_rls.sh'

jobs:
  apply-rls:
    name: Apply Supabase RLS SQL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Supabase CLI communicates over HTTPS (Management API) — no direct DB port needed.
      # Requires SUPABASE_ACCESS_TOKEN secret (supabase.com → Account → Access Tokens).
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply rls_policies.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute \
            --project-ref htydcedtuuczxjwtqrqx \
            --file backend/db/rls_policies.sql

      - name: Apply rls_policies_roles.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute \
            --project-ref htydcedtuuczxjwtqrqx \
            --file backend/db/rls_policies_roles.sql
